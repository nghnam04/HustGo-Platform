server:
  port: 8086

spring:
  application:
    name: routing-service

eureka:
  instance:
    prefer-ip-address: true
  client:
    register-with-eureka: true
    fetch-registry: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

app:
  osrm:
    base-url: http://localhost:5000