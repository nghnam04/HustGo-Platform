name: Deploy Frontend to GKE

on:
  push:
    branches:
      - prod
    paths:
      - 'frontend/**'

env:
  PROJECT_ID: hustgo-492614
  GAR_LOCATION: asia-northeast1
  GKE_CLUSTER: cluster-hustgo
  GKE_ZONE: asia-northeast1-c
  DEPLOYMENT_NAME: frontend
  NAMESPACE: hustgo
  REPOSITORY: hustgo
  IMAGE: frontend

jobs:
  build-and-deploy:
    name: Build and Deploy Frontend
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker to use GAR
      run: |
        gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev

    - name: Get GKE credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_ZONE }}

    - name: Build and Push Docker Image
      run: |
        cd frontend
        IMAGE_TAG=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}
        IMAGE_LATEST=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest
        
        docker build \
          --build-arg VITE_GOOGLE_CLIENT_ID="${{ secrets.VITE_GOOGLE_CLIENT_ID }}" \
          --build-arg VITE_FACEBOOK_APP_ID="${{ secrets.VITE_FACEBOOK_APP_ID }}" \
          -t $IMAGE_TAG \
          -t $IMAGE_LATEST \
          .
          
        docker push $IMAGE_TAG
        docker push $IMAGE_LATEST

    - name: Deploy to GKE
      run: |
        kubectl set image deployment/${{ env.DEPLOYMENT_NAME }} frontend=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }} -n ${{ env.NAMESPACE }}
        
        kubectl rollout status deployment/${{ env.DEPLOYMENT_NAME }} -n ${{ env.NAMESPACE }}
