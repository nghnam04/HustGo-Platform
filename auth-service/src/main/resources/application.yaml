spring:
  application:
    name: auth-service

  # postgresql
  datasource:
    url: jdbc:postgresql://localhost:5432/hustgo_auth_db
    username: postgres
    password: admin
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

# Redis
  data:
    redis:
      host: redis
      port: 6379

# JWT
jwt:
  secret: ${JWT_SECRET}
  expiration: 604800000

server:
  port: 8080

app:
  google:
    client-id: ${GOOGLE_CLIENT_ID}
  facebook:
    app-id: ${FACEBOOK_APP_ID}
    app-secret: ${FACEBOOK_APP_SECRET}