services:
  redis:
    image: redis:latest
    container_name: hustgo-redis
    ports:
      - "6379:6379"
    restart: always
    volumes:
      - redis_data:/data

  kafka:
    image: bitnamilegacy/kafka:latest
    container_name: hustgo-kafka
    ports:
      - "9092:9092"
    restart: always
    environment:
      # KRaft mode
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@hustgo-kafka:9093

      # listener config
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      KAFKA_KRAFT_CLUSTER_ID: N0vYmR4ZlRkS1J5eFpZdzBR

      ALLOW_PLAINTEXT_LISTENER: "yes"

    volumes:
      - kafka_data:/bitnami/kafka

  rabbitmq:
    image: rabbitmq:3-management
    container_name: hustgo-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    restart: always

  zipkin:
    image: openzipkin/zipkin
    container_name: hustgo-zipkin
    ports:
      - "9411:9411"
    restart: always

volumes:
  postgres_data:
  redis_data:
  kafka_data: