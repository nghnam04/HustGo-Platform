server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: https://github.com/nghnam04/HustGo-Platform-Config-Server
          clone-on-start: true
          default-label: main

eureka:
  instance:
    client:
      serverUrl:
        defaultZone: http://localhost:8761/eureka/