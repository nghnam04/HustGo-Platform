apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: hustgo
  labels:
    app: notification-service
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: asia-northeast1-docker.pkg.dev/hustgo-492614/hustgo/notification-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
          envFrom:
            - configMapRef:
                name: hustgo-common-config
            - configMapRef:
                name: notification-service-config
            - secretRef:
                name: hustgo-app-secrets
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=70.0 -XX:+UseG1GC -XX:+UseStringDeduplication -Deureka.client.serviceUrl.defaultZone=http://service-registry:8761/eureka/"
          resources:
            requests:
              memory: "256Mi"
              cpu: "20m"
            limits:
              memory: "512Mi"
              cpu: "400m"
          startupProbe:
            tcpSocket:
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 150
          readinessProbe:
            tcpSocket:
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8084
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: hustgo
  labels:
    app: notification-service
spec:
  type: ClusterIP
  ports:
    - port: 8084
      targetPort: 8084
      protocol: TCP
      name: http
  selector:
    app: notification-service
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: hustgo
data:
  SERVER_PORT: "8084"
