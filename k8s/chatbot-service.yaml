apiVersion: apps/v1
kind: Deployment
metadata:
  name: chatbot-service
  namespace: hustgo
  labels:
    app: chatbot-service
spec:
  strategy:
    type: Recreate
  replicas: 1
  selector:
    matchLabels:
      app: chatbot-service
  template:
    metadata:
      labels:
        app: chatbot-service
    spec:
      containers:
        - name: chatbot-service
          image: asia-northeast1-docker.pkg.dev/hustgo-492614/hustgo/chatbot-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8087
          envFrom:
            - configMapRef:
                name: hustgo-common-config
            - configMapRef:
                name: chatbot-service-config
            - secretRef:
                name: hustgo-app-secrets
          env:
            - name: JAVA_TOOL_OPTIONS
              value: "-XX:MaxRAMPercentage=70.0 -XX:+UseG1GC -XX:+UseStringDeduplication -Deureka.client.serviceUrl.defaultZone=http://service-registry:8761/eureka/"
          resources:
            requests:
              memory: "256Mi"
              cpu: "20m"
            limits:
              memory: "512Mi"
              cpu: "400m"
          startupProbe:
            tcpSocket:
              port: 8087
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 150
          readinessProbe:
            tcpSocket:
              port: 8087
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8087
            initialDelaySeconds: 15
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: chatbot-service
  namespace: hustgo
  labels:
    app: chatbot-service
spec:
  type: ClusterIP
  ports:
    - port: 8087
      targetPort: 8087
      protocol: TCP
      name: http
  selector:
    app: chatbot-service
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: chatbot-service-config
  namespace: hustgo
data:
  SERVER_PORT: "8087"
